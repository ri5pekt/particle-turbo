name: particle-turbo

services:
  postgres-commerce:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_COMMERCE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_COMMERCE_PASSWORD}
      POSTGRES_DB: ${POSTGRES_COMMERCE_DB}
    volumes:
      - postgres-commerce-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_COMMERCE_USER} -d ${POSTGRES_COMMERCE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - particle-turbo-network

  postgres-content:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_CONTENT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_CONTENT_PASSWORD}
      POSTGRES_DB: ${POSTGRES_CONTENT_DB}
    volumes:
      - postgres-content-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_CONTENT_USER} -d ${POSTGRES_CONTENT_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - particle-turbo-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - particle-turbo-network

  commerce:
    build:
      context: .
      dockerfile: apps/commerce/Dockerfile.prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:9030:9000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${MEDUSA_DATABASE_URL}
      DATABASE_SSL: "false"
      REDIS_URL: ${MEDUSA_REDIS_URL}
      JWT_SECRET: ${MEDUSA_JWT_SECRET}
      COOKIE_SECRET: ${MEDUSA_COOKIE_SECRET}
      MEDUSA_ADMIN_EMAIL: ${MEDUSA_ADMIN_EMAIL}
      MEDUSA_ADMIN_PASSWORD: ${MEDUSA_ADMIN_PASSWORD}
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      BRAINTREE_ENABLED: ${BRAINTREE_ENABLED:-false}
      BRAINTREE_ENVIRONMENT: ${BRAINTREE_ENVIRONMENT:-sandbox}
      BRAINTREE_MERCHANT_ID: ${BRAINTREE_MERCHANT_ID}
      BRAINTREE_PUBLIC_KEY: ${BRAINTREE_PUBLIC_KEY}
      BRAINTREE_PRIVATE_KEY: ${BRAINTREE_PRIVATE_KEY}
      BRAINTREE_MERCHANT_ACCOUNT_ID: ${BRAINTREE_MERCHANT_ACCOUNT_ID}
      BRAINTREE_SUBMIT_FOR_SETTLEMENT: ${BRAINTREE_SUBMIT_FOR_SETTLEMENT:-true}
    depends_on:
      postgres-commerce:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - particle-turbo-network

  content:
    build:
      context: .
      dockerfile: apps/content/Dockerfile.prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:1338:1337"
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres-content
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_CONTENT_DB}
      DATABASE_USERNAME: ${POSTGRES_CONTENT_USER}
      DATABASE_PASSWORD: ${POSTGRES_CONTENT_PASSWORD}
      DATABASE_SSL: "false"
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      STRAPI_ADMIN_EMAIL: ${STRAPI_ADMIN_EMAIL}
      STRAPI_ADMIN_INITIAL_PASSWORD: ${STRAPI_ADMIN_INITIAL_PASSWORD}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      R2_REGION: ${R2_REGION:-auto}
      CORS_ORIGIN: ${CORS_ORIGIN}
      HOST: 0.0.0.0
      PORT: 1337
    depends_on:
      postgres-content:
        condition: service_healthy
    networks:
      - particle-turbo-network

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile.prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:3030:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_PUBLIC_MEDUSA_URL: ${NUXT_PUBLIC_MEDUSA_URL}
      NUXT_PUBLIC_STRAPI_URL: ${NUXT_PUBLIC_STRAPI_URL}
      NUXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NUXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      NUXT_PUBLIC_ADMIN_BAR_ENABLED: "false"
      NUXT_MEDUSA_INTERNAL_URL: ${NUXT_MEDUSA_INTERNAL_URL:-http://commerce:9000}
      NUXT_STRAPI_INTERNAL_URL: ${NUXT_STRAPI_INTERNAL_URL:-http://content:1337}
      NUXT_MEDUSA_API_KEY: ${NUXT_MEDUSA_API_KEY}
      NUXT_STRAPI_API_TOKEN: ${NUXT_STRAPI_API_TOKEN}
      NUXT_REDIS_URL: ${NUXT_REDIS_URL:-redis://redis:6379}
      NUXT_STAMPED_PUBLIC_KEY: ${NUXT_STAMPED_PUBLIC_KEY}
      NUXT_STAMPED_STORE_HASH: ${NUXT_STAMPED_STORE_HASH}
      NUXT_STAMPED_STORE_URL: ${NUXT_STAMPED_STORE_URL}
      NUXT_STAMPED_WIDGET_CACHE_TTL: ${NUXT_STAMPED_WIDGET_CACHE_TTL}
    depends_on:
      commerce:
        condition: service_started
      content:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - particle-turbo-network

volumes:
  postgres-commerce-data:
    name: particle-turbo-postgres-commerce-data
  postgres-content-data:
    name: particle-turbo-postgres-content-data
  redis-data:
    name: particle-turbo-redis-data

networks:
  particle-turbo-network:
    name: particle-turbo-network
    driver: bridge
